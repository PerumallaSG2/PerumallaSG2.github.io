<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Processing Card</title>
<style>
  body { margin: 0; background: #060612; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  @keyframes pulse1 { 0%,100%{opacity:0;transform:scale(0)} 40%{opacity:1} 80%{opacity:0;transform:scale(1)} }
  @keyframes pulse2 { 0%,100%{opacity:0;transform:scale(0)} 40%{opacity:1} 80%{opacity:0;transform:scale(1)} }
  @keyframes flow1  { 0%{offset-distance:0%;opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{offset-distance:100%;opacity:0} }
  @keyframes flow2  { 0%{offset-distance:0%;opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{offset-distance:100%;opacity:0} }
  @keyframes flow3  { 0%{offset-distance:0%;opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{offset-distance:100%;opacity:0} }
  @keyframes shimmer{ 0%{opacity:.5} 50%{opacity:1} 100%{opacity:.5} }
  @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes spin   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .card-wrap {
    width: 560px;
    height: 360px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 80px rgba(99,102,241,0.3), 0 0 0 1px rgba(255,255,255,0.07);
    background: #080818;
  }

  canvas { position: absolute; top: 0; left: 0; }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* Title */
  .title-bar {
    padding: 18px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .title-tag {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #6366f1;
    text-transform: uppercase;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.3);
    padding: 4px 10px;
    border-radius: 4px;
  }
  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: monospace;
    font-size: 9px;
    color: #22c55e;
    letter-spacing: 2px;
  }
  .live-dot span {
    width: 6px; height: 6px;
    background: #22c55e;
    border-radius: 50%;
    animation: blink 1.2s infinite;
    box-shadow: 0 0 6px #22c55e;
  }

  .title-main {
    padding: 6px 28px 0;
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 19px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .title-main em {
    font-style: normal;
    background: linear-gradient(90deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Main scene */
  .scene {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    gap: 0;
  }

  /* PHONE */
  .phone {
    width: 72px;
    flex-shrink: 0;
    animation: float 3.5s ease-in-out infinite;
  }
  .phone-body {
    width: 72px;
    height: 118px;
    background: linear-gradient(145deg, #1e1b4b, #0f0a2e);
    border-radius: 14px;
    border: 1.5px solid rgba(129,140,248,0.4);
    box-shadow: 0 0 30px rgba(99,102,241,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 14px;
    gap: 6px;
  }
  .phone-notch {
    position: absolute;
    top: 5px;
    width: 24px; height: 5px;
    background: #060612;
    border-radius: 3px;
  }
  .phone-coin {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #78350f;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 0 18px rgba(245,158,11,0.5);
    animation: shimmer 2s infinite;
  }
  .phone-bars {
    display: flex; flex-direction: column; gap: 4px; width: 48px;
  }
  .phone-bar {
    height: 4px; border-radius: 2px;
    background: rgba(129,140,248,0.3);
  }
  .phone-bar.active { background: rgba(129,140,248,0.7); width: 70%; }
  .phone-bar:nth-child(2) { width: 85%; }
  .phone-home {
    position: absolute;
    bottom: 5px;
    width: 20px; height: 3px;
    background: rgba(129,140,248,0.4);
    border-radius: 2px;
  }
  .phone-label {
    font-family: monospace;
    font-size: 8px;
    color: #818cf8;
    text-align: center;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ARROW TRACK */
  .track {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, rgba(99,102,241,0.6), rgba(139,92,246,0.6));
    position: relative;
    margin: 0 6px;
  }
  .track::after {
    content: '';
    position: absolute;
    right: -5px; top: -4px;
    border: 5px solid transparent;
    border-left: 8px solid rgba(139,92,246,0.8);
  }
  .track-dot {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px;
    background: #a78bfa;
    border-radius: 50%;
    box-shadow: 0 0 10px #a78bfa;
    animation: pulse1 2s infinite;
  }
  .track-dot:nth-child(2) { animation-delay: 0.7s; }
  .track-dot:nth-child(3) { animation-delay: 1.4s; }

  /* CENTER HUB */
  .hub {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: float 4s ease-in-out infinite 0.5s;
  }
  .hub-box {
    width: 100px;
    background: linear-gradient(145deg, #1e1b4b, #130f35);
    border: 1.5px solid rgba(139,92,246,0.5);
    border-radius: 16px;
    padding: 12px 10px;
    box-shadow: 0 0 40px rgba(139,92,246,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }
  .hub-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(99,102,241,0.5);
  }
  .hub-title {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: #c4b5fd;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
  }
  .hub-nodes {
    display: flex; gap: 5px;
  }
  .hub-node {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: shimmer 1.5s infinite;
  }
  .hub-node:nth-child(1) { background: #6366f1; animation-delay: 0s; box-shadow: 0 0 6px #6366f1; }
  .hub-node:nth-child(2) { background: #8b5cf6; animation-delay: 0.3s; box-shadow: 0 0 6px #8b5cf6; }
  .hub-node:nth-child(3) { background: #a78bfa; animation-delay: 0.6s; box-shadow: 0 0 6px #a78bfa; }

  .hub-label {
    font-family: monospace;
    font-size: 8px;
    color: #7c3aed;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* RIGHT STACK */
  .right-stack {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .tech-card {
    width: 110px;
    border-radius: 12px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 9px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }
  .tech-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
  }

  .tech-card.kafka {
    background: rgba(245,158,11,0.07);
    border-color: rgba(245,158,11,0.3);
    box-shadow: 0 0 20px rgba(245,158,11,0.08);
    animation: float 3.8s ease-in-out infinite 0.2s;
  }
  .tech-card.redis {
    background: rgba(239,68,68,0.07);
    border-color: rgba(239,68,68,0.3);
    box-shadow: 0 0 20px rgba(239,68,68,0.08);
    animation: float 3.2s ease-in-out infinite 0.8s;
  }
  .tech-card.java {
    background: rgba(34,197,94,0.07);
    border-color: rgba(34,197,94,0.3);
    box-shadow: 0 0 20px rgba(34,197,94,0.08);
    animation: float 4.2s ease-in-out infinite 1.2s;
  }

  .tech-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .kafka .tech-icon { background: rgba(245,158,11,0.15); box-shadow: 0 0 12px rgba(245,158,11,0.2); }
  .redis .tech-icon { background: rgba(239,68,68,0.15); box-shadow: 0 0 12px rgba(239,68,68,0.2); }
  .java .tech-icon  { background: rgba(34,197,94,0.15); box-shadow: 0 0 12px rgba(34,197,94,0.2); }

  .tech-info { display: flex; flex-direction: column; gap: 3px; }
  .tech-name {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .tech-desc {
    font-family: monospace;
    font-size: 7px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .kafka .tech-desc { color: #fbbf24; }
  .redis .tech-desc { color: #fca5a5; }
  .java  .tech-desc { color: #86efac; }

  /* RIGHT tracks */
  .right-tracks {
    position: absolute;
    left: 0; top: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  /* Bottom stats bar */
  .stats-bar {
    padding: 10px 28px 16px;
    display: flex;
    gap: 24px;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: #fff;
  }
  .stat-key {
    font-family: monospace;
    font-size: 7px;
    letter-spacing: 1.5px;
    color: #4b5563;
    text-transform: uppercase;
  }
  .stat-sep {
    width: 1px; height: 28px;
    background: rgba(255,255,255,0.07);
  }
  .throughput-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .throughput-fill {
    height: 100%;
    width: 72%;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(99,102,241,0.6);
    animation: shimmer 2s infinite;
  }
</style>
</head>
<body>
<div class="card-wrap">
  <!-- Animated BG canvas -->
  <canvas id="bgCanvas" width="560" height="360"></canvas>

  <div class="overlay">
    <!-- Title -->
    <div class="title-bar">
      <div class="title-tag">Event-Driven Architecture</div>
      <div class="live-dot"><span></span>LIVE</div>
    </div>
    <div class="title-main">Payment <em>Processing</em> System</div>

    <!-- Main scene -->
    <div class="scene">

      <!-- PHONE -->
      <div class="phone">
        <div class="phone-body">
          <div class="phone-notch"></div>
          <div class="phone-coin">$</div>
          <div class="phone-bars">
            <div class="phone-bar active"></div>
            <div class="phone-bar"></div>
            <div class="phone-bar active" style="width:55%"></div>
          </div>
          <div class="phone-home"></div>
        </div>
        <div class="phone-label">Client</div>
      </div>

      <!-- TRACK left -->
      <div class="track" style="max-width:42px">
        <div class="track-dot" style="left:10%"></div>
        <div class="track-dot" style="left:45%"></div>
        <div class="track-dot" style="left:75%"></div>
      </div>

      <!-- HUB -->
      <div class="hub">
        <div class="hub-box">
          <div class="hub-icon">⚡</div>
          <div class="hub-title">Microservices</div>
          <div class="hub-nodes">
            <div class="hub-node"></div>
            <div class="hub-node"></div>
            <div class="hub-node"></div>
          </div>
        </div>
        <div class="hub-label">Event Bus</div>
      </div>

      <!-- SVG connector lines hub → right cards -->
      <svg style="position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 560 220" preserveAspectRatio="none">
        <!-- to Kafka -->
        <path d="M 318 95 Q 360 55 402 68" stroke="rgba(245,158,11,0.45)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="3.5" fill="#f59e0b" opacity="0.9" filter="url(#glw)">
          <animateMotion dur="1.8s" repeatCount="indefinite" path="M 318 95 Q 360 55 402 68"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <!-- to Redis -->
        <path d="M 318 110 Q 355 115 402 115" stroke="rgba(239,68,68,0.45)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="3.5" fill="#ef4444" opacity="0.9">
          <animateMotion dur="2.1s" repeatCount="indefinite" begin="0.4s" path="M 318 110 Q 355 115 402 115"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="2.1s" repeatCount="indefinite" begin="0.4s"/>
        </circle>
        <!-- to Java -->
        <path d="M 318 125 Q 358 155 402 160" stroke="rgba(34,197,94,0.45)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="3.5" fill="#22c55e" opacity="0.9">
          <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.9s" path="M 318 125 Q 358 155 402 160"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite" begin="0.9s"/>
        </circle>
        <defs>
          <filter id="glw"><feGaussianBlur stdDeviation="2"/></filter>
        </defs>
      </svg>

      <!-- RIGHT STACK -->
      <div class="right-stack" style="margin-left: 28px;">
        <div class="tech-card kafka">
          <div class="tech-icon">📨</div>
          <div class="tech-info">
            <div class="tech-name">Kafka</div>
            <div class="tech-desc">Event Stream</div>
          </div>
        </div>
        <div class="tech-card redis">
          <div class="tech-icon">⚡</div>
          <div class="tech-info">
            <div class="tech-name">Redis</div>
            <div class="tech-desc">Cache Layer</div>
          </div>
        </div>
        <div class="tech-card java">
          <div class="tech-icon">🌿</div>
          <div class="tech-info">
            <div class="tech-name">Spring Boot</div>
            <div class="tech-desc">API Gateway</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" style="color:#a78bfa">99.9%</div>
        <div class="stat-key">Uptime</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-val" style="color:#fbbf24">12ms</div>
        <div class="stat-key">Latency</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-val" style="color:#34d399">1.4M</div>
        <div class="stat-key">TXN / Day</div>
      </div>
      <div class="stat-sep"></div>
      <div style="flex:1">
        <div class="stat-key" style="margin-bottom:5px">Throughput</div>
        <div class="throughput-bar"><div class="throughput-fill"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
const W = 560, H = 360;

// Particle field
const particles = Array.from({length: 55}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3,
  color: ['#6366f1','#8b5cf6','#f59e0b','#ef4444','#22c55e'][Math.floor(Math.random()*5)],
  opacity: Math.random() * 0.5 + 0.15
}));

function drawBg() {
  ctx.clearRect(0, 0, W, H);

  // Deep gradient background
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#08091a');
  grad.addColorStop(0.5, '#0d0d24');
  grad.addColorStop(1, '#080818');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Glow blobs
  const blobs = [
    { x: 90, y: 100, r: 120, color: 'rgba(99,102,241,0.07)' },
    { x: 460, y: 260, r: 110, color: 'rgba(245,158,11,0.06)' },
    { x: 280, y: 180, r: 100, color: 'rgba(139,92,246,0.06)' },
    { x: 440, y: 80, r: 80, color: 'rgba(34,197,94,0.05)' },
  ];
  blobs.forEach(b => {
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, b.color);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let x = 20; x < W; x += 28) {
    for (let y = 20; y < H; y += 28) {
      ctx.beginPath();
      ctx.arc(x, y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Particles + connections
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.opacity;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Connections between nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 70) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(99,102,241,${0.06 * (1 - dist/70)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  drawBg();
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
