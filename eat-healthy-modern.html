<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eat Healthy App</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060612; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Inter','Helvetica Neue',sans-serif; }

  @keyframes float1  { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-8px)} }
  @keyframes float2  { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-6px)} }
  @keyframes float3  { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-5px)} }
  @keyframes shimmer { 0%,100%{opacity:.55} 50%{opacity:1} }
  @keyframes blink   { 0%,100%{opacity:1}  50%{opacity:.2} }
  @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes growBar { from{width:0} to{width:var(--w)} }
  @keyframes popIn   { 0%{transform:scale(0);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  @keyframes leafSway{ 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
  @keyframes pulse-green { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)} 70%{box-shadow:0 0 0 12px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes ticker  { 0%{offset-distance:0%;opacity:0} 8%{opacity:1} 85%{opacity:1} 100%{offset-distance:100%;opacity:0} }

  .card {
    width:560px; height:360px; border-radius:20px; overflow:hidden;
    position:relative; border:1px solid rgba(255,255,255,.07);
    box-shadow:0 0 80px rgba(34,197,94,.15), 0 0 0 1px rgba(255,255,255,.04);
  }
  canvas { position:absolute; inset:0; }
  .ui { position:absolute; inset:0; display:flex; flex-direction:column; }

  /* TOP */
  .top { padding:18px 24px 0; display:flex; justify-content:space-between; align-items:center; }
  .tag { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:#4ade80; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); padding:4px 12px; border-radius:4px; font-family:'SF Mono',monospace; }
  .live { display:flex; align-items:center; gap:6px; font-size:9px; color:#22c55e; letter-spacing:2px; font-family:monospace; }
  .live-dot { width:7px;height:7px;background:#22c55e;border-radius:50%;animation:blink 1.2s infinite;box-shadow:0 0 8px #22c55e; }

  .title { padding:6px 24px 0; }
  .title h1 { font-size:19px; font-weight:800; color:#fff; letter-spacing:-.5px; }
  .title h1 em { font-style:normal; color:#4ade80; }

  /* SCENE */
  .scene { flex:1; display:flex; align-items:center; padding:0 20px; gap:16px; position:relative; }

  /* PHONE */
  .phone { flex-shrink:0; width:82px; animation:float1 3.5s ease-in-out infinite; }
  .phone-body {
    width:74px; height:130px; margin:0 auto;
    background:linear-gradient(145deg,#052e16,#14532d);
    border-radius:14px; border:1.5px solid rgba(34,197,94,.4);
    box-shadow:0 0 28px rgba(34,197,94,.2);
    display:flex; flex-direction:column; align-items:center;
    padding:12px 8px 8px; gap:6px; position:relative;
  }
  .phone-notch { position:absolute; top:5px; width:24px; height:5px; background:#060612; border-radius:3px; }
  .phone-plate {
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg,#16a34a,#15803d);
    border:2px solid rgba(74,222,128,.4);
    box-shadow:0 0 18px rgba(34,197,94,.35);
    display:flex; align-items:center; justify-content:center; font-size:26px;
    animation:float2 3s ease-in-out infinite .5s;
  }
  .phone-stats { width:100%; display:flex; flex-direction:column; gap:4px; }
  .pstat { display:flex; justify-content:space-between; align-items:center; }
  .pstat-label { font-size:6px; color:rgba(74,222,128,.6); font-family:monospace; letter-spacing:.5px; }
  .pstat-bar { flex:1; height:3px; background:rgba(34,197,94,.1); border-radius:2px; margin:0 5px; overflow:hidden; }
  .pstat-fill { height:100%; border-radius:2px; background:#22c55e; animation:shimmer 2s infinite; }
  .phone-home { width:22px;height:3px;background:rgba(74,222,128,.3);border-radius:2px; }
  .phone-label { font-size:8px;color:#4ade80;text-align:center;letter-spacing:1px;text-transform:uppercase;font-family:monospace;margin-top:4px; }

  /* CONNECTORS SVG */
  .connectors { position:absolute; inset:0; pointer-events:none; }

  /* CENTER BADGE + WHEEL */
  .center-group { flex:1; display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px; animation:float2 4s ease-in-out infinite .3s; }

  .badge-stamp {
    width:120px; height:100px;
    background:rgba(5,46,22,.7);
    border:2px solid rgba(34,197,94,.4);
    border-radius:8px;
    box-shadow:0 0 30px rgba(34,197,94,.2), inset 0 1px 0 rgba(255,255,255,.05);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px; position:relative;
  }
  .stamp-eat { font-size:32px; font-weight:900; color:#fff; letter-spacing:2px; line-height:1; }
  .stamp-dot { font-size:32px; font-weight:900; color:#4ade80; }
  .stamp-divider { width:80px; height:1.5px; background:rgba(74,222,128,.4); }
  .stamp-healthy { font-size:13px; font-weight:700; color:#4ade80; letter-spacing:4px; }
  .stamp-leaf {
    position:absolute; top:-12px; right:-10px;
    font-size:20px; animation:leafSway 2.5s ease-in-out infinite;
    transform-origin:bottom center;
  }
  .stamp-corner { position:absolute; font-size:8px; color:rgba(74,222,128,.3); }

  /* NUTRIENT RINGS */
  .rings { position:relative; width:70px; height:70px; }
  .rings svg { position:absolute; inset:0; }
  .ring-label { position:absolute; inset:0; display:flex;align-items:center;justify-content:center; font-size:9px; color:#4ade80; font-weight:700; font-family:monospace; }

  /* RIGHT FOOD CARDS */
  .food-stack { flex-shrink:0; width:160px; display:flex; flex-direction:column; gap:8px; }

  .food-card {
    border-radius:10px; padding:8px 12px;
    display:flex; align-items:center; gap:10px;
    border:1px solid; position:relative; overflow:hidden;
  }
  .food-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.03),transparent); }
  .food-card.protein { background:rgba(239,68,68,.07); border-color:rgba(239,68,68,.25); animation:float1 3.8s ease-in-out infinite .1s; }
  .food-card.carbs   { background:rgba(234,179,8,.07); border-color:rgba(234,179,8,.25); animation:float2 3.3s ease-in-out infinite .5s; }
  .food-card.fats    { background:rgba(34,197,94,.07); border-color:rgba(34,197,94,.25); animation:float3 4s ease-in-out infinite .9s; }

  .food-icon { font-size:22px; flex-shrink:0; }
  .food-info { display:flex;flex-direction:column;gap:3px; flex:1; }
  .food-name { font-size:10px; font-weight:700; color:#fff; }
  .food-macro { font-size:7px; font-family:monospace; letter-spacing:.5px; text-transform:uppercase; }
  .protein .food-macro { color:#fca5a5; }
  .carbs   .food-macro { color:#fde68a; }
  .fats    .food-macro { color:#86efac; }
  .food-cal { font-size:9px; font-weight:700; color:rgba(255,255,255,.5); }

  /* STATS */
  .stats { padding:8px 24px 14px; border-top:1px solid rgba(255,255,255,.05); display:flex; gap:0; align-items:center; }
  .stat { display:flex;flex-direction:column;gap:2px;padding:0 16px; }
  .stat:first-child{padding-left:0;}
  .stat-val { font-size:14px; font-weight:800; }
  .stat-key { font-size:7px; color:#4b5563; letter-spacing:1.5px; text-transform:uppercase; font-family:monospace; }
  .stat-sep { width:1px; height:28px; background:rgba(255,255,255,.07); }
  .cal-wrap { flex:1; padding-left:16px; }
  .cal-label { font-size:7px; color:#4b5563; letter-spacing:1.5px; text-transform:uppercase; font-family:monospace; margin-bottom:5px; }
  .cal-bar { height:5px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; }
  .cal-fill { height:100%; width:68%; background:linear-gradient(90deg,#22c55e,#84cc16); border-radius:3px; box-shadow:0 0 8px rgba(34,197,94,.5); animation:shimmer 2s infinite; }
</style>
</head>
<body>
<div class="card">
  <canvas id="c"></canvas>
  <div class="ui">

    <div class="top">
      <div class="tag">Nutrition · Health · Wellness</div>
      <div class="live"><div class="live-dot"></div>TRACKING</div>
    </div>
    <div class="title">
      <h1>Eat <em>Healthy</em> Tracker</h1>
    </div>

    <div class="scene">
      <!-- animated connectors -->
      <svg class="connectors" viewBox="0 0 560 220">
        <path d="M 90 110 Q 140 110 175 110" stroke="rgba(34,197,94,.4)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="4" fill="#4ade80" opacity=".9">
          <animateMotion dur="1.8s" repeatCount="indefinite" path="M 90 110 Q 140 110 175 110"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <path d="M 325 85 Q 355 68 380 68" stroke="rgba(239,68,68,.4)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="4" fill="#f87171" opacity=".9">
          <animateMotion dur="1.5s" repeatCount="indefinite" begin=".3s" path="M 325 85 Q 355 68 380 68"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin=".3s"/>
        </circle>
        <path d="M 325 110 Q 355 110 380 120" stroke="rgba(234,179,8,.4)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="4" fill="#fbbf24" opacity=".9">
          <animateMotion dur="2s" repeatCount="indefinite" begin=".7s" path="M 325 110 Q 355 110 380 120"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin=".7s"/>
        </circle>
        <path d="M 325 135 Q 355 158 380 168" stroke="rgba(34,197,94,.4)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
        <circle r="4" fill="#4ade80" opacity=".9">
          <animateMotion dur="1.7s" repeatCount="indefinite" begin="1.1s" path="M 325 135 Q 355 158 380 168"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" repeatCount="indefinite" begin="1.1s"/>
        </circle>
      </svg>

      <!-- PHONE -->
      <div class="phone">
        <div class="phone-body">
          <div class="phone-notch"></div>
          <div class="phone-plate">🥗</div>
          <div class="phone-stats">
            <div class="pstat">
              <span class="pstat-label">CAL</span>
              <div class="pstat-bar"><div class="pstat-fill" style="width:68%"></div></div>
            </div>
            <div class="pstat">
              <span class="pstat-label">PRO</span>
              <div class="pstat-bar"><div class="pstat-fill" style="width:82%;animation-delay:.4s"></div></div>
            </div>
            <div class="pstat">
              <span class="pstat-label">FAT</span>
              <div class="pstat-bar"><div class="pstat-fill" style="width:45%;animation-delay:.8s"></div></div>
            </div>
          </div>
          <div class="phone-home"></div>
        </div>
        <div class="phone-label">Log Meal</div>
      </div>

      <!-- CENTER: BADGE + RINGS -->
      <div class="center-group">
        <div class="badge-stamp">
          <div class="stamp-leaf">🌿</div>
          <div class="stamp-corner" style="top:6px;left:8px">◤</div>
          <div class="stamp-corner" style="bottom:6px;right:8px">◢</div>
          <div style="display:flex;align-items:baseline;gap:0">
            <span class="stamp-eat">EAT</span><span class="stamp-dot">.</span>
          </div>
          <div class="stamp-divider"></div>
          <div class="stamp-healthy">HEALTHY</div>
        </div>

        <!-- SVG Nutrient ring -->
        <div class="rings">
          <svg viewBox="0 0 70 70" width="70" height="70">
            <!-- outer ring: carbs -->
            <circle cx="35" cy="35" r="30" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
            <circle cx="35" cy="35" r="30" fill="none" stroke="#facc15" stroke-width="5"
              stroke-dasharray="135 189" stroke-dashoffset="-47" stroke-linecap="round"
              style="animation:shimmer 2s infinite"/>
            <!-- middle: protein -->
            <circle cx="35" cy="35" r="22" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
            <circle cx="35" cy="35" r="22" fill="none" stroke="#f87171" stroke-width="5"
              stroke-dasharray="104 138" stroke-dashoffset="-34" stroke-linecap="round"
              style="animation:shimmer 2s .3s infinite"/>
            <!-- inner: fats -->
            <circle cx="35" cy="35" r="14" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
            <circle cx="35" cy="35" r="14" fill="none" stroke="#4ade80" stroke-width="5"
              stroke-dasharray="55 88" stroke-dashoffset="-22" stroke-linecap="round"
              style="animation:shimmer 2s .6s infinite"/>
          </svg>
          <div class="ring-label">NTR</div>
        </div>
      </div>

      <!-- FOOD CARDS -->
      <div class="food-stack">
        <div class="food-card protein">
          <div class="food-icon">🥩</div>
          <div class="food-info">
            <div class="food-name">Protein</div>
            <div class="food-macro">High Quality</div>
          </div>
          <div class="food-cal">32g</div>
        </div>
        <div class="food-card carbs">
          <div class="food-icon">🌾</div>
          <div class="food-info">
            <div class="food-name">Carbs</div>
            <div class="food-macro">Complex</div>
          </div>
          <div class="food-cal">48g</div>
        </div>
        <div class="food-card fats">
          <div class="food-icon">🥑</div>
          <div class="food-info">
            <div class="food-name">Healthy Fats</div>
            <div class="food-macro">Omega 3</div>
          </div>
          <div class="food-cal">18g</div>
        </div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <div class="stat-val" style="color:#4ade80">1,840</div>
        <div class="stat-key">Calories</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-val" style="color:#fbbf24">92g</div>
        <div class="stat-key">Protein</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-val" style="color:#f87171">7-day</div>
        <div class="stat-key">Streak 🔥</div>
      </div>
      <div class="stat-sep"></div>
      <div class="cal-wrap">
        <div class="cal-label">Daily Goal</div>
        <div class="cal-bar"><div class="cal-fill"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
c.width=560; c.height=360;
const W=560,H=360;

const pts=Array.from({length:55},()=>({
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28,
  r:Math.random()*1.4+.3,
  col:['#22c55e','#4ade80','#86efac','#84cc16','#16a34a'][Math.floor(Math.random()*5)],
  a:Math.random()*.35+.1
}));

function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#050d07'); g.addColorStop(.5,'#07120a'); g.addColorStop(1,'#050d07');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  [{x:80,y:120,r:150,c:'rgba(34,197,94,.07)'},{x:420,y:260,r:130,c:'rgba(132,204,22,.05)'},{x:280,y:180,r:110,c:'rgba(74,222,128,.05)'},{x:450,y:80,r:90,c:'rgba(34,197,94,.04)'}].forEach(b=>{
    const rg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    rg.addColorStop(0,b.c); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='rgba(255,255,255,.018)';
  for(let x=20;x<W;x+=32)for(let y=20;y<H;y+=32){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.globalAlpha=p.a; ctx.fill(); ctx.globalAlpha=1;
  });
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<65){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
    ctx.strokeStyle=`rgba(34,197,94,${.05*(1-d/65)})`;ctx.lineWidth=.5;ctx.stroke();}
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
